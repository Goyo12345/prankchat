<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PrankChat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: #1a1a2e;
      color: white;
      font-family: 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 10px;
      color: #e94560;
    }

    p.subtitle {
      color: #aaa;
      margin-bottom: 40px;
    }

    .card {
      background: #16213e;
      border-radius: 16px;
      padding: 30px;
      width: 500px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    input {
      background: #0f3460;
      border: none;
      border-radius: 10px;
      padding: 12px 16px;
      color: white;
      font-size: 1rem;
      outline: none;
      width: 100%;
    }

    input::placeholder {
      color: #888;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .control-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .control-label {
      font-size: 1.3rem;
      width: 26px;
      text-align: center;
      flex-shrink: 0;
    }

    .opt-group {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }

    .opt {
      background: #0f3460;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.15s;
    }

    .opt:hover { background: #14477f; }
    .opt.active { background: #e94560; font-weight: bold; }

    .pos-grid {
      display: grid;
      grid-template-columns: repeat(3, 34px);
      grid-template-rows: repeat(3, 34px);
      gap: 4px;
    }

    .pos-grid .opt {
      padding: 0;
      font-size: 1.1rem;
    }

    button {
      background: #e94560;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.2s;
    }

    button:hover {
      background: #c73652;
    }

    button:disabled {
      cursor: not-allowed;
    }

    .status {
      text-align: center;
      font-size: 0.85rem;
      padding: 8px;
      border-radius: 8px;
    }

    .status.connecte {
      background: #1a4a2e;
      color: #4caf50;
    }

    .status.deconnecte {
      background: #4a1a1a;
      color: #f44336;
    }

    .status.attente {
      background: #3a3a1a;
      color: #ffeb3b;
    }

    .room-section {
      display: flex;
      gap: 10px;
    }

    .room-section input {
      flex: 1;
    }

    .room-section button {
      width: auto;
      padding: 12px 20px;
    }

    .user-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 4px;
    }

    .user-bar button {
      width: auto;
      padding: 6px 12px;
      font-size: 0.8rem;
      background: #0f3460;
    }

    .user-bar button:hover { background: #14477f; }

    .auth-secondary { background: #0f3460; }
    .auth-secondary:hover { background: #14477f; }

  </style>
</head>
<body>
  <h1>💥 PrankChat</h1>
  <p class="subtitle">Envoie des vannes à tes amis en temps réel</p>

  <!-- Écran de connexion (visible tant qu'on n'est pas connecté) -->
  <div class="card" id="authCard">
    <input type="email" id="authEmail" placeholder="Ton email" />
    <input type="password" id="authPassword" placeholder="Ton mot de passe (min. 6 caractères)" />
    <div class="status" id="authStatus" style="display:none"></div>
    <button onclick="logIn()">Se connecter</button>
    <button class="auth-secondary" onclick="signUp()">Créer un compte</button>
  </div>

  <!-- L'app (cachée tant qu'on n'est pas connecté) -->
  <div class="card" id="appCard" style="display:none">
    <div class="user-bar">
      <span>👤 <span id="userEmail"></span></span>
      <button onclick="logOut()">Déconnexion</button>
    </div>

    <div class="room-section">
      <input type="text" id="roomCode" placeholder="Code de la room" />
      <button onclick="generateRoomCode()" title="Générer un code sécurisé">🎲</button>
      <button onclick="joinRoom()">Rejoindre</button>
    </div>

    <div class="status deconnecte" id="status">❌ Non connecté</div>

    <input type="text" id="imageUrl" placeholder="URL image, GIF, YouTube, TikTok..." />
    <input type="text" id="caption" placeholder="Texte de la vanne (optionnel)" />

    <div class="controls">
      <div class="control-row">
        <span class="control-label" title="Durée d'affichage">⏱️</span>
        <div class="opt-group" id="durationGroup">
          <button class="opt active" data-value="10000">10s</button>
          <button class="opt" data-value="20000">20s</button>
          <button class="opt" data-value="30000">30s</button>
          <button class="opt" data-value="40000">40s</button>
          <button class="opt" data-value="50000">50s</button>
          <button class="opt" data-value="60000">60s</button>
        </div>
      </div>

      <div class="control-row">
        <span class="control-label" title="Taille">🔎</span>
        <div class="opt-group" id="sizeGroup">
          <button class="opt" data-value="small">Petit</button>
          <button class="opt active" data-value="medium">Moyen</button>
          <button class="opt" data-value="large">Grand</button>
        </div>
      </div>

      <div class="control-row">
        <span class="control-label" title="Position">📍</span>
        <div class="opt-group" id="positionGroup">
          <div class="pos-grid">
            <button class="opt" data-value="top-left" title="Haut-gauche">↖</button>
            <button class="opt" data-value="top" title="Haut">↑</button>
            <button class="opt" data-value="top-right" title="Haut-droite">↗</button>
            <button class="opt" data-value="left" title="Gauche">←</button>
            <button class="opt active" data-value="center" title="Centre">●</button>
            <button class="opt" data-value="right" title="Droite">→</button>
            <button class="opt" data-value="bottom-left" title="Bas-gauche">↙</button>
            <button class="opt" data-value="bottom" title="Bas">↓</button>
            <button class="opt" data-value="bottom-right" title="Bas-droite">↘</button>
          </div>
          <button class="opt" data-value="random" title="Position aléatoire">🎲</button>
        </div>
      </div>
    </div>

    <button id="sendBtn" onclick="sendPrank()">🎯 Envoyer la vanne</button>
  </div>

  <!-- Écran "abonnement requis" (connecté mais pas abonné) -->
  <div class="card" id="subscribeCard" style="display:none">
    <div class="user-bar">
      <span>👤 <span id="userEmailSub"></span></span>
      <button onclick="logOut()">Déconnexion</button>
    </div>
    <p style="text-align:center; line-height:1.5;">
      🔒 Pour envoyer des vannes, il te faut un <b>abonnement actif</b>.
    </p>
    <button onclick="startSubscription()">✨ S'abonner</button>
    <button class="auth-secondary" onclick="recheckAccess()">🔄 J'ai payé, vérifier</button>
  </div>

  <script src="config.js"></script>
  <script>
    const { ipcRenderer } = require('electron')
    const io = require('socket.io-client')
    const { createClient } = require('@supabase/supabase-js')

    const supabase = createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY)

    let socket = null
    let currentRoom = null
    let mySendToken = null

    function isYoutubeOrTiktok(url) {
      return url.includes('youtube.com') ||
             url.includes('youtu.be') ||
             url.includes('tiktok.com')
    }

    // Génère un code de room aléatoire et impossible à deviner.
    // On évite les caractères ambigus (0/O, 1/l/i) pour qu'il reste lisible.
    function generateRoomCode() {
      const chars = 'abcdefghjkmnpqrstuvwxyz23456789'
      const bytes = new Uint8Array(8)
      window.crypto.getRandomValues(bytes)
      let code = ''
      for (let i = 0; i < 8; i++) {
        code += chars[bytes[i] % chars.length]
      }
      document.getElementById('roomCode').value = code
    }

    // Boutons d'options (durée, taille, position) : un seul actif par groupe.
    document.querySelectorAll('.opt-group').forEach((group) => {
      group.addEventListener('click', (e) => {
        const btn = e.target.closest('.opt')
        if (!btn) return
        group.querySelectorAll('.opt').forEach((b) => b.classList.remove('active'))
        btn.classList.add('active')
      })
    })

    function getOption(groupId) {
      const active = document.querySelector('#' + groupId + ' .opt.active')
      return active ? active.dataset.value : null
    }

    // ---------- Connexion / Inscription (Supabase) ----------

    function showAuthStatus(msg, ok) {
      const el = document.getElementById('authStatus')
      el.textContent = msg
      el.className = 'status ' + (ok ? 'connecte' : 'deconnecte')
      el.style.display = 'block'
    }

    const SERVER = 'https://prankchat-production.up.railway.app'

    // Après connexion : on demande au serveur si l'abonnement est actif,
    // puis on affiche soit l'app, soit l'écran "abonne-toi".
    async function enterApp(session) {
      document.getElementById('authCard').style.display = 'none'
      document.getElementById('userEmail').textContent = session.user.email
      document.getElementById('userEmailSub').textContent = session.user.email

      let subscribed = false
      try {
        const res = await fetch(SERVER + '/access', {
          headers: { Authorization: 'Bearer ' + session.access_token }
        })
        subscribed = (await res.json()).subscribed
      } catch (e) {
        console.error('Vérif abonnement échouée:', e)
      }

      if (subscribed) {
        document.getElementById('subscribeCard').style.display = 'none'
        document.getElementById('appCard').style.display = 'flex'
      } else {
        document.getElementById('appCard').style.display = 'none'
        document.getElementById('subscribeCard').style.display = 'flex'
      }
    }

    function showLogin() {
      document.getElementById('appCard').style.display = 'none'
      document.getElementById('subscribeCard').style.display = 'none'
      document.getElementById('authCard').style.display = 'flex'
    }

    async function startSubscription() {
      const { data } = await supabase.auth.getSession()
      if (!data.session) return
      try {
        const res = await fetch(SERVER + '/create-checkout', {
          method: 'POST',
          headers: { Authorization: 'Bearer ' + data.session.access_token }
        })
        const { url } = await res.json()
        if (url) {
          require('electron').shell.openExternal(url) // ouvre la page de paiement dans le navigateur
        } else {
          alert('Impossible de démarrer le paiement pour le moment. Réessaie dans un instant.')
        }
      } catch (e) {
        alert('Erreur : ' + e.message)
      }
    }

    // Après le paiement, l'utilisateur revient et clique "J'ai payé" -> on re-vérifie.
    async function recheckAccess() {
      const { data } = await supabase.auth.getSession()
      if (data.session) enterApp(data.session)
    }

    async function signUp() {
      const email = document.getElementById('authEmail').value.trim()
      const password = document.getElementById('authPassword').value
      if (!email || !password) { showAuthStatus('Remplis l\'email et le mot de passe.', false); return }
      const { data, error } = await supabase.auth.signUp({ email, password })
      if (error) { showAuthStatus(error.message, false); return }
      if (data.session) {
        enterApp(data.session) // si la confirmation d'email est désactivée : connecté direct
      } else {
        showAuthStatus('Compte créé ! Confirme ton email puis connecte-toi.', true)
      }
    }

    async function logIn() {
      const email = document.getElementById('authEmail').value.trim()
      const password = document.getElementById('authPassword').value
      if (!email || !password) { showAuthStatus('Remplis l\'email et le mot de passe.', false); return }
      const { data, error } = await supabase.auth.signInWithPassword({ email, password })
      if (error) { showAuthStatus(error.message, false); return }
      enterApp(data.session)
    }

    async function logOut() {
      await supabase.auth.signOut()
      if (socket) { socket.disconnect(); socket = null; currentRoom = null }
      showLogin()
    }

    // Au démarrage : si une session est déjà enregistrée, on ouvre l'app direct.
    supabase.auth.getSession().then(({ data }) => {
      if (data.session) enterApp(data.session)
    })

    function joinRoom() {
      const roomCode = document.getElementById('roomCode').value.trim()
      if (!roomCode) {
        alert('Entre un code de room !')
        return
      }

      socket = io('https://prankchat-production.up.railway.app')

      socket.on('connect', () => {
        // On rejoint la room et on récupère notre jeton secret d'envoi.
        socket.emit('join-room', roomCode, (token) => {
          mySendToken = token
        })
        currentRoom = roomCode
        document.getElementById('status').textContent = '⏳ En attente de ton ami...'
        document.getElementById('status').className = 'status attente'
      })

      socket.on('friend-connected', () => {
        document.getElementById('status').textContent = '✅ Ami connecté ! Envoie des vannes !'
        document.getElementById('status').className = 'status connecte'
      })

      socket.on('room-users', (count) => {
        if (count >= 2) {
          document.getElementById('status').textContent = '✅ Ami connecté ! Envoie des vannes !'
          document.getElementById('status').className = 'status connecte'
        }
      })

      socket.on('receive-prank', (data) => {
        ipcRenderer.send('show-prank', data)
      })
    }

    function sendPrank() {
      if (!socket || !currentRoom) {
        alert('Rejoins une room d\'abord !')
        return
      }

      const imageUrl = document.getElementById('imageUrl').value
      const caption = document.getElementById('caption').value
      const duration = parseInt(getOption('durationGroup'), 10)
      const position = getOption('positionGroup')
      const size = getOption('sizeGroup')

      if (!imageUrl) {
        alert('Mets une URL d\'image ou GIF !')
        return
      }

      const btn = document.getElementById('sendBtn')
      btn.disabled = true
      btn.textContent = '⏳ Envoi en cours...'
      btn.style.background = '#888'

      if (isYoutubeOrTiktok(imageUrl)) {
        // YouTube/TikTok : on télécharge sur CE PC puis on relaie au serveur.
        // (Le serveur relaiera le lien .mp4 à OBS et à l'ami.)
        ipcRenderer.send('download-and-relay', {
          imageUrl,
          caption,
          roomCode: currentRoom,
          senderId: socket.id,
          sendToken: mySendToken,
          duration,
          position,
          size
        })
      } else {
        // Image / GIF / vidéo .mp4 directe : le serveur relaie l'URL telle quelle.
        socket.emit('send-prank', {
          roomCode: currentRoom,
          imageUrl,
          caption,
          duration,
          position,
          size
        })

        ipcRenderer.send('show-prank', { imageUrl, caption, duration, position, size })
      }

      setTimeout(() => {
        btn.disabled = false
        btn.textContent = '🎯 Envoyer la vanne'
        btn.style.background = '#e94560'
      }, 8000)
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        ipcRenderer.send('close-overlay')
      }
    })
  </script>
</body>
</html>
