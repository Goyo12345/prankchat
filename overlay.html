<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: transparent;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }
    #prank-container {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      animation: popin 0.3s ease;
    }
    @keyframes popin {
      from { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
      to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    }
    #prank-image {
      max-width: 500px;
      max-height: 400px;
      border-radius: 16px;
      box-shadow: 0 0 40px rgba(0,0,0,0.8);
    }
    #prank-video {
      width: 640px;
      height: 360px;
      border-radius: 16px;
      box-shadow: 0 0 40px rgba(0,0,0,0.8);
    }
    #prank-caption {
      color: white;
      font-size: 1.5rem;
      font-family: 'Segoe UI', sans-serif;
      font-weight: bold;
      text-shadow: 2px 2px 8px black;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="prank-container">
    <img id="prank-image" src="" />
    <video id="prank-video" style="display:none" autoplay controls></video>
    <p id="prank-caption"></p>
  </div>

  <script>
    const { ipcRenderer } = require('electron')

    const container = document.getElementById('prank-container')
    const img = document.getElementById('prank-image')
    const video = document.getElementById('prank-video')
    const caption = document.getElementById('prank-caption')

    ipcRenderer.on('show-prank', (event, data) => {
      caption.textContent = data.caption || ''

      if (data.imageUrl.match(/\.(mp4|webm|ogg|mov)(\?|$)/i)) {
        img.style.display = 'none'
        video.style.display = 'block'
        video.src = data.imageUrl
        video.play()

        video.onended = () => {
          container.style.display = 'none'
          video.src = ''
        }
      } else {
        video.style.display = 'none'
        video.src = ''
        img.style.display = 'block'
        img.src = data.imageUrl

        setTimeout(() => {
          container.style.display = 'none'
        }, 5000)
      }

      container.style.display = 'flex'
    })

    ipcRenderer.on('close-overlay', () => {
      container.style.display = 'none'
      video.src = ''
    })
  </script>
</body>
</html>
